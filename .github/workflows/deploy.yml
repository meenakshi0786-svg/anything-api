name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────────
  # Deploy to Staging
  # ────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: staging
      url: https://staging.anythingapi.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit SHA for image tag
        id: vars
        run: echo "sha_short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Deploy to staging
        run: |
          echo "=========================================="
          echo " Deploying to STAGING"
          echo "=========================================="
          echo ""
          echo "Images:"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ steps.vars.outputs.sha_short }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:${{ steps.vars.outputs.sha_short }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${{ steps.vars.outputs.sha_short }}"
          echo ""
          echo "TODO: Replace this with your actual deployment command, e.g.:"
          echo "  kubectl set image deployment/api api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ steps.vars.outputs.sha_short }}"
          echo "  flyctl deploy --image ..."
          echo "  aws ecs update-service ..."
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Verify staging deployment
        run: |
          echo "TODO: Add health check for staging environment"
          echo "  curl --fail https://staging.anythingapi.dev/health"

  # ────────────────────────────────────────────────────────────
  # Deploy to Production (manual approval required)
  # ────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://anythingapi.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit SHA for image tag
        id: vars
        run: echo "sha_short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Deploy to production
        run: |
          echo "=========================================="
          echo " Deploying to PRODUCTION"
          echo "=========================================="
          echo ""
          echo "Images:"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ steps.vars.outputs.sha_short }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:${{ steps.vars.outputs.sha_short }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${{ steps.vars.outputs.sha_short }}"
          echo ""
          echo "TODO: Replace this with your actual deployment command, e.g.:"
          echo "  kubectl set image deployment/api api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ steps.vars.outputs.sha_short }}"
          echo "  flyctl deploy --image ..."
          echo "  aws ecs update-service ..."
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Verify production deployment
        run: |
          echo "TODO: Add health check for production environment"
          echo "  curl --fail https://anythingapi.dev/health"
